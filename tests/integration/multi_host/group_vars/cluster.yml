---
# Cluster-wide baseline. Allows the minimal command set the stub LLM will
# request (`uname -r`). host_vars/host2.yml will extend this on a single
# host to verify the layered rule merge actually applies host_vars on top.
ansible_ai_rules:
  allow:
    run_cmd:
      - uname
    read_file: []
    write_file: []
    python: []
    network: false
  deny:
    run_cmd: []
    read_file: []
    write_file: []
    python: []
  budget:
    max_iterations: 3
    max_tokens: 4000
