name: dns_broken
prompt: "This host fails to resolve any hostname. Find the cause."

rules:
  allow:
    run_cmd: [dig, nslookup, ss]
    read_file: ["/etc/**", "/run/**"]
    write_file: []
    python: []
    network: true
  deny:
    run_cmd: [rm]
    read_file: []
    write_file: ["**"]
    python: [socket]
  budget:
    max_iterations: 5
    max_tokens: 8000

host_ctx:
  hostname: edge-2
  groups: [edge, all]
  role: edge
  facts:
    ansible_distribution: Ubuntu
    ansible_kernel: 6.5.0-test

turns:
  - tool_call:
      name: read_file
      input:
        path: /etc/resolv.conf
        reason: "Look at the configured resolvers first."
    target:
      stdout: |
        # Generated by NetworkManager
        nameserver 127.0.0.53
        options edns0 trust-ad
        search local
      stderr: ""
      exit: 0

  - tool_call:
      name: run_cmd
      input:
        argv: [ss, -tnlp, sport, "=", ":53"]
        reason: "Resolver points to systemd-resolved stub (127.0.0.53). Verify whether the stub is actually listening."
    target:
      stdout: |
        State    Recv-Q  Send-Q  Local Address:Port
      stderr: ""
      exit: 0

  - tool_call:
      name: run_cmd
      input:
        argv: [dig, +short, +time=2, "@1.1.1.1", example.com]
        reason: "Nothing listening on :53. Try a direct query to a public resolver to confirm upstream is reachable."
    target:
      stdout: |
        93.184.216.34
      stderr: ""
      exit: 0

  - tool_call:
      name: done
      input:
        summary: "Resolution fails because /etc/resolv.conf points to the systemd-resolved stub at 127.0.0.53 but no process is listening on port 53 - the systemd-resolved unit is down. Upstream DNS itself is healthy (dig @1.1.1.1 succeeds). Fix: restart systemd-resolved or repoint resolv.conf to a real nameserver."
        reason: "resolv.conf names the local stub; ss confirms no listener; @1.1.1.1 succeeds, so the issue is local stub, not upstream."

expect:
  diagnosis_contains: ["systemd-resolved", "127.0.0.53", "53"]
  max_iterations: 5
  must_converge: true
