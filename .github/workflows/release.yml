---
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    name: Build + publish to Ansible Galaxy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Install ansible-core
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core

      - name: Verify tag matches galaxy.yml version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          gv=$(grep '^version:' galaxy.yml | awk '{print $2}')
          if [ "$tag" != "$gv" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match galaxy.yml version $gv" >&2
            exit 1
          fi

      - name: Build collection
        run: ansible-galaxy collection build .

      - name: Publish to Ansible Galaxy
        env:
          ANSIBLE_GALAXY_TOKEN: ${{ secrets.ANSIBLE_GALAXY_TOKEN }}
        run: |
          if [ -z "$ANSIBLE_GALAXY_TOKEN" ]; then
            echo "::error::ANSIBLE_GALAXY_TOKEN secret not set in repo settings" >&2
            exit 1
          fi
          ansible-galaxy collection publish ./*.tar.gz --token "$ANSIBLE_GALAXY_TOKEN"

      - name: Create GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          files: "*.tar.gz"
          generate_release_notes: true
