---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
      - uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd  # v3.0.1

  test:
    name: pytest (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install pytest + ansible-core
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyyaml ansible-core
      - name: Run unit tests
        run: pytest tests/unit/ -v
      - name: Run eval (scripted-LLM orchestrator E2E)
        run: pytest tests/eval/ -v

  security:
    name: bandit (SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
      - name: Install bandit
        run: pip install "bandit[toml]"
      - name: Run bandit
        run: bandit -c pyproject.toml -r plugins/

  sanity:
    name: ansible-test sanity
    runs-on: ubuntu-latest
    # Advisory until the legacy sanity ruleset is fully reconciled with our
    # ruff/yamllint config; flip to required once the diff is empty.
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          path: ansible_collections/yalindogusahin/ansible_ai
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
      - name: Install ansible-core
        run: pip install ansible-core
      - name: Run ansible-test sanity
        working-directory: ansible_collections/yalindogusahin/ansible_ai
        run: ansible-test sanity --docker default --skip-test pep8 --skip-test pylint

  build:
    name: ansible-galaxy build
    runs-on: ubuntu-latest
    needs: [lint, test, security]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
      - name: Install ansible-core
        run: pip install ansible-core
      - name: Build collection
        run: ansible-galaxy collection build .
      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: collection
          path: "*.tar.gz"
          retention-days: 14
