---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd  # v3.0.1

  test:
    name: pytest (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python }}
      - name: Install pytest + ansible-core
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyyaml ansible-core
      - name: Run unit tests
        run: pytest tests/unit/ -v
      - name: Run eval (scripted-LLM orchestrator E2E)
        run: pytest tests/eval/ -v

  security:
    name: bandit (SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Install bandit
        run: pip install "bandit[toml]"
      - name: Run bandit
        run: bandit -c pyproject.toml -r plugins/

  sanity:
    name: ansible-test sanity
    runs-on: ubuntu-latest
    # Advisory until the legacy sanity ruleset is fully reconciled with our
    # ruff/yamllint config; flip to required once the diff is empty.
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          path: ansible_collections/yalindogusahin/ansible_ai
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Install ansible-core
        run: pip install ansible-core
      - name: Run ansible-test sanity
        working-directory: ansible_collections/yalindogusahin/ansible_ai
        run: ansible-test sanity --docker default --skip-test pep8 --skip-test pylint

  integration:
    name: integration smoke (stub LLM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          path: ansible_collections/yalindogusahin/ansible_ai
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Install ansible-core
        run: pip install ansible-core
      - name: Start scripted-LLM stub
        working-directory: ansible_collections/yalindogusahin/ansible_ai
        run: |
          python tests/integration/stub_llm.py 8765 &
          for _ in $(seq 1 20); do
            curl -sf -o /dev/null -X POST http://127.0.0.1:8765 -d '{}' && break
            sleep 0.5
          done
      - name: Run localhost smoke playbook against stub
        working-directory: ansible_collections/yalindogusahin/ansible_ai
        env:
          ANSIBLE_COLLECTIONS_PATH: ${{ github.workspace }}
          ANTHROPIC_API_KEY: stub
        run: |
          ansible-playbook tests/integration/playbook_localhost_smoke.yml \
            -e provider=claude \
            -e endpoint=http://127.0.0.1:8765 \
            -e api_key=stub \
            -e model=stub-claude

  build:
    name: ansible-galaxy build
    runs-on: ubuntu-latest
    needs: [lint, test, security, integration]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Install ansible-core
        run: pip install ansible-core
      - name: Build collection
        run: ansible-galaxy collection build .
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: collection
          path: "*.tar.gz"
          retention-days: 14
