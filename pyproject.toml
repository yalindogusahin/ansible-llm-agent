[tool.ruff]
line-length = 110
target-version = "py310"

extend-exclude = [
    "tests/integration",
]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM"]
ignore = [
    "E501",  # line length handled by formatter
    "B008",  # function call in default arg (common in ansible)
    "UP007", # `X | Y` annotations require py310+; we use `from __future__ import annotations`
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["B"]
"plugins/modules/*.py" = ["E402"]  # ansible modules use top-level DOCUMENTATION strings before imports

[tool.ruff.format]
quote-style = "double"
