---
minor_changes:
  - >
    .gitignore: add ``.ruff_cache/`` and ``.ansible/`` (ansible-lint's
    runtime cache) so they no longer leak into ``git status``.
  - >
    .ansible-lint: drop the ``tests/integration/playbook_*.yml`` exclude
    entries — the FQCN-resolution issue they worked around is now handled
    globally by ``mock_modules`` (added with the examples/ cookbook), so
    the integration playbooks lint cleanly. Required a one-line
    task-name casing fix on ``playbook_localhost_smoke.yml``.
