---
security_fixes:
  - >
    sandbox.validate_ast now rejects ``os.system`` and ``os.popen`` outright.
    Both always invoke ``/bin/sh`` at runtime, so even when ``argv[0]``
    resolved to an allow-listed binary, the rest of the string was interpreted
    by the shell and slipped commands past ``run_cmd`` (e.g.
    ``os.system('ls; rm -rf /')`` with ``ls`` allow-listed). Use
    ``subprocess.run`` with a list argv instead.
  - >
    sandbox.validate_ast now rejects ``subprocess.X(..., shell=True)`` (and
    any non-statically-False ``shell=`` kwarg) on ``run``/``Popen``/``call``/
    ``check_call``/``check_output``. ``shell=True`` collapses argv into
    ``/bin/sh -c <cmd>`` and bypasses both the allowlist and the AST walk.
  - >
    sandbox.validate_ast now rejects ``getattr``/``setattr``/``hasattr`` calls
    whose literal-string second argument is a dangerous attribute name
    (``eval``, ``exec``, ``__import__``, ``__class__``, ``__bases__``,
    ``__subclasses__``, ``__mro__``, ``__globals__``, ``__builtins__``).
    This is the canonical sandbox-escape primitive: the dangerous name is a
    string at the AST level, so the existing Name-based check missed it.
  - >
    sandbox.validate_ast now rejects bare references to ``__builtins__``.
    Legitimate snippets never name it; the only reason to reach for it is to
    dig dangerous callables out of the namespace.
minor_changes:
  - >
    tests/unit/test_sandbox.py: 11 new adversarial cases covering
    ``shell=True``, ``getattr(__builtins__, "eval")`` indirection,
    ``__builtins__`` lookups, ``os.system``/``os.popen`` categorical rejection,
    nested-function ``eval``, and aliased-builtin ``eval``.
